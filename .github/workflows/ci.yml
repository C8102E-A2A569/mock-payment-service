name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-test-build:
    name: Lint, test, build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find Go module root
        id: gomod
        run: |
          if [ -f go.mod ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          else
            d=$(find . -maxdepth 3 -name go.mod -type f | head -1)
            if [ -z "$d" ]; then echo "::error::go.mod not found"; exit 1; fi
            echo "dir=$(dirname $d)" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ steps.gomod.outputs.dir }}/go.mod
          cache-dependency-path: ${{ steps.gomod.outputs.dir }}/go.sum

      - name: Download dependencies
        working-directory: ${{ steps.gomod.outputs.dir }}
        run: go mod download

      - name: Format
        working-directory: ${{ steps.gomod.outputs.dir }}
        run: gofmt -w .

      - name: golangci-lint
        working-directory: ${{ steps.gomod.outputs.dir }}
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8 run --timeout=5m

      - name: Run tests
        working-directory: ${{ steps.gomod.outputs.dir }}
        run: go test -v -race -count=1 ./...

      - name: Build
        working-directory: ${{ steps.gomod.outputs.dir }}
        run: go build -o bin/server ./cmd/server

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find Go module root for Docker context
        id: gomod
        run: |
          if [ -f go.mod ]; then
            echo "dir=." >> $GITHUB_OUTPUT
          else
            d=$(find . -maxdepth 3 -name go.mod -type f | head -1)
            if [ -z "$d" ]; then echo "dir=." >> $GITHUB_OUTPUT; else echo "dir=$(dirname $d)" >> $GITHUB_OUTPUT; fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.gomod.outputs.dir }}
          file: ${{ steps.gomod.outputs.dir }}/deployments/docker/Dockerfile
          push: false
          tags: mock-payment:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
