# Минимальный набор линтеров, чтобы CI не падал на предупреждения (exit 3)
run:
  timeout: 5m

linters:
  enable:
    - gofmt
    - govet
  disable-all: true
  disable:
    - fieldalignment  # часто срабатывает по-разному на платформах, отключаем

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment
